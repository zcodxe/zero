<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Intelligence</title>
<link rel="preconnect" href="https://api.ipify.org">
<link rel="preconnect" href="https://api6.ipify.org">
<link rel="preconnect" href="https://ipinfo.io">
<link rel="dns-prefetch" href="https://api.ipify.org">
<link rel="dns-prefetch" href="https://api6.ipify.org">
<link rel="dns-prefetch" href="https://ipinfo.io">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafafa;--text:#222;--muted:#666;--border:#ddd;--link:#0055bb;--divider:#626262;--stb: #97b6d3be}
@media(prefers-color-scheme:dark){:root{--bg:#111;--text:#e8e8e6;--muted:#888;--border:#929292ba;--link:#4d9fff;--stb:#b0b0b072;--divider:#444}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 24px;border-bottom:1px solid var(--divider)}
header h1{font-size:20px;font-weight:700;opacity:.75}
#btn-refresh{font-family:inherit;font-size:18px;font-weight: bold;color:var(--link);background:none;border:none;cursor:pointer;min-width:90px;text-align:right}
#btn-refresh:disabled{opacity:.6;cursor:not-allowed}
main{max-width:560px;margin:0 auto;padding:20px 24px 60px}
#status-bar{font-size:12px;color:var(--muted);padding:4px 0 8px;min-height:20px;font-style:italic}
#status-bar.err{color:#c0392b;font-style:normal}
.row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:8px 0}
.row-label{font-size:14px;color:var(--muted);flex-shrink:0;min-width:110px}
.row-right{display:flex;align-items:center;justify-content:flex-end;flex:1;min-width:0;gap:8px}
.row-value{font-size:15px;font-weight:500;color:var(--text);text-align:right;word-break:break-all}
.row-value.big{font-size:22px;font-weight:700}
.row-value.mono{font-family:ui-monospace,'SF Mono',Consolas,monospace;font-size:13.5px;font-weight:400}
.copy-btn{font-family:inherit;font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;padding:2px 8px;line-height:1.6;transition:color .15s,border-color .15s}
.copy-btn:hover{color:var(--text);border-color:var(--muted)}
.skel{display:inline-block;border-radius:4px;background:var(--border);animation:pulse 1.4s ease-in-out infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
.section{border-top:1px solid var(--border)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 0;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.sec-title{font-size:12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);transition:color .15s,background .15s;padding:2px 6px;border-radius:4px;margin-left:-6px}
.sec-hdr:hover .sec-title{color:var(--text);opacity:.8}
.section.open .sec-title{color:var(--text);background: var(--stb);opacity:.7.5}
.chevron{font-size:18px;color:var(--muted);transition:transform .2s}
.section.open .chevron{transform:rotate(180deg)}
.sec-body{display:none;padding-bottom:10px}
.section.open .sec-body{display:block}
.sec-note{font-size:13px;color:var(--muted);font-style:italic;padding:4px 0}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:1px 8px;border-radius:20px;line-height:1.8}
.badge-yes{background:#d4edda;color:#155724}
.badge-no{background:#f0f0f0;color:#888}
@media(prefers-color-scheme:dark){.badge-yes{background:#1a3a22;color:#6fcf8a}.badge-no{background:#222;color:#666}}
pre.rawpre{margin-top:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px 14px;font-family:ui-monospace,'SF Mono',Consolas,monospace;font-size:12px;line-height:1.75;color:var(--text);white-space:pre;overflow-x:auto}
.ua-box{font-family:ui-monospace,Consolas,monospace;font-size:11px;color:var(--muted);word-break:break-all;line-height:1.6;padding:4px 0 8px}
.mini-div{height:1px;background:var(--border);margin:8px 0;opacity:.5}
.missing{color:var(--muted);font-size:13px}
.hidden{display:none!important}
</style>
</head>
<body>
<header>
  <h1>IP Intelligence</h1>
  <button id="btn-refresh">↻ Refresh</button>
</header>
<main>
  <div id="status-bar"></div>
  <div class="row">
    <span class="row-label">Country</span>
    <span class="row-value big" id="v-country"><span class="skel" style="width:110px;height:21px"></span></span>
  </div>
  <div class="row">
    <span class="row-label">IPv4</span>
    <span class="row-right">
      <span class="row-value mono" id="v-v4"><span class="skel" style="width:105px;height:14px"></span></span>
      <button class="copy-btn hidden" id="cp-v4" onclick="doCopy('v-v4',this)">copy</button>
    </span>
  </div>
  <div class="row">
    <span class="row-label">IPv6</span>
    <span class="row-right">
      <span class="row-value mono" id="v-v6"><span class="skel" style="width:150px;height:14px"></span></span>
      <button class="copy-btn hidden" id="cp-v6" onclick="doCopy('v-v6',this)">copy</button>
    </span>
  </div>
  <div class="row">
    <span class="row-label">ISP / Org</span>
    <span class="row-value" id="v-isp"><span class="skel" style="width:130px;height:14px"></span></span>
  </div>

  <div class="section" id="s-net">
    <div class="sec-hdr" onclick="tog('s-net')"><span class="sec-title">Network</span><span class="chevron">▼</span></div>
    <div class="sec-body" id="b-net"><div class="sec-note">Tap to load</div></div>
  </div>
  <div class="section" id="s-loc">
    <div class="sec-hdr" onclick="tog('s-loc')"><span class="sec-title">Location</span><span class="chevron">▼</span></div>
    <div class="sec-body" id="b-loc"><div class="sec-note">Tap to load</div></div>
  </div>
  <div class="section" id="s-time">
    <div class="sec-hdr" onclick="tog('s-time')"><span class="sec-title">Time &amp; Currency</span><span class="chevron">▼</span></div>
    <div class="sec-body" id="b-time"><div class="sec-note">Tap to load</div></div>
  </div>
  <div class="section" id="s-flags">
    <div class="sec-hdr" onclick="tog('s-flags')"><span class="sec-title">Connection Flags</span><span class="chevron">▼</span></div>
    <div class="sec-body" id="b-flags"><div class="sec-note">Tap to load</div></div>
  </div>
  <div class="section" id="s-dev">
    <div class="sec-hdr" onclick="tog('s-dev')"><span class="sec-title">Device Info</span><span class="chevron">▼</span></div>
    <div class="sec-body" id="b-dev"><div class="sec-note">Tap to load</div></div>
  </div>
  <div class="section" id="s-raw">
    <div class="sec-hdr" onclick="tog('s-raw')"><span class="sec-title">Raw Data</span><span class="chevron">▼</span></div>
    <div class="sec-body" id="b-raw"><div class="sec-note">Tap to load</div></div>
  </div>
</main>

// timezone offset from Intl API (accurate, handles DST)
function tzOffset(tzName){
  try{
    const now=new Date();
    const parts=Intl.DateTimeFormat('en',{timeZone:tzName,timeZoneName:'shortOffset'}).formatToParts(now);
    const off=parts.find(p=>p.type==='timeZoneName')?.value||'';
    const m=off.match(/GMT([+-])(\d{1,2})(?::(\d{2}))?/);
    if(!m) return 0;
    const s=(parseInt(m[2])*3600+(parseInt(m[3]||0)*60))*(m[1]==='+'?1:-1);
    return s;
  }catch(e){return null;}
}
const utcS=sec=>{
  const g=sec>=0?'+':'-',a=Math.abs(sec);
  return 'UTC'+g+String(Math.floor(a/3600)).padStart(2,'0')+':'+String(Math.floor((a%3600)/60)).padStart(2,'0');
};

const sk=(w,h)=>`<span class="skel" style="width:${w}px;height:${h}px"></span>`;
const esc=s=>(s==null||s==='')?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const R=(l,val,mono=false)=>{
  const show=val!=null&&val!==''?`<span class="row-value${mono?' mono':''}">${esc(String(val))}</span>`:`<span class="missing">—</span>`;
  return `<div class="row"><span class="row-label">${l}</span>${show}</div>`;
};
const RR=(l,val)=>{
  let b;
  if(val===true)  b='<span class="badge badge-yes">Yes</span>';
  else if(val===false) b='<span class="badge badge-no">No</span>';
  else b='<span class="missing">—</span>';
  return `<div class="row"><span class="row-label">${l}</span><span class="row-right">${b}</span></div>`;
};

function ft(url,ms){
  const c=new AbortController(),t=setTimeout(()=>c.abort(),ms);
  return fetch(url,{signal:c.signal}).finally(()=>clearTimeout(t));
}

window.tog=function(id){
  const s=$(id); s.classList.toggle('open');
  if(s.classList.contains('open')) fill(id);
};

  } else if(id==='s-raw'){
    const txt=JSON.stringify(RAW,null,2);
    const escTxt=txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    b.innerHTML=`<pre class="rawpre">${escTxt}</pre>`;
  }
}

function fillOpen(){
  ['s-net','s-loc','s-time','s-flags','s-raw'].forEach(id=>{
    if($(id).classList.contains('open')) fill(id);
  });
}

function devHTML(){
  const ua=navigator.userAgent||'',n=navigator;
  function os(){
    if(/Windows NT 1[01]/.test(ua))        return 'Windows 10/11';
    if(/Windows/.test(ua))                  return 'Windows';
    if(/iPhone OS ([\d_]+)/.test(ua))       return 'iOS '+RegExp.$1.replace(/_/g,'.');
    if(/iPad.*OS ([\d_]+)/.test(ua))        return 'iPadOS '+RegExp.$1.replace(/_/g,'.');
    if(/Android ([\d.]+)/.test(ua))         return 'Android '+RegExp.$1;
    if(/Mac OS X ([\d_.]+)/.test(ua))       return 'macOS '+RegExp.$1.replace(/_/g,'.');
    if(/CrOS/.test(ua))                     return 'ChromeOS';
    if(/Linux/.test(ua))                    return 'Linux';
    return null;
  }
  function br(){
    if(/Edg\/([\S]+)/.test(ua))             return 'Edge '   +RegExp.$1;
    if(/OPR\/([\S]+)/.test(ua))             return 'Opera '  +RegExp.$1;
    if(/Chrome\/([\S]+)/.test(ua))          return 'Chrome ' +RegExp.$1;
    if(/Firefox\/([\S]+)/.test(ua))         return 'Firefox '+RegExp.$1;
    if(/Version\/([\S]+).*Safari/.test(ua)) return 'Safari ' +RegExp.$1;
    return null;
  }
  function dt(){
    if(/iPad/.test(ua))                          return 'Tablet (iPad)';
    if(/Android.*Mobile|iPhone|iPod/.test(ua))   return 'Mobile';
    if(/Android/.test(ua))                       return 'Tablet (Android)';
    return 'Desktop';
  }
  const conn=n.connection||n.mozConnection||n.webkitConnection;
  let h='';
  h+=R('OS',os()); h+=R('Browser',br()); h+=R('Device Type',dt());
  h+=R('Screen',screen.width+'×'+screen.height+' px');
  h+=R('Viewport',innerWidth+'×'+innerHeight+' px');
  h+=R('Pixel Ratio',devicePixelRatio+'×');
  h+=R('Color Depth',screen.colorDepth+' bit');
  h+=R('CPU Cores',n.hardwareConcurrency||null);
  h+=R('Device Memory',n.deviceMemory?n.deviceMemory+' GB (approx.)':null);
  h+=R('Max Touch Points',n.maxTouchPoints!=null?String(n.maxTouchPoints):null);
  h+=R('Language',n.language||null);
  h+=R('All Languages',(n.languages||[]).join(', ')||null);
  h+=R('Local Timezone',Intl.DateTimeFormat().resolvedOptions().timeZone||null);
  h+=R('Do Not Track',n.doNotTrack==='1'?'Enabled':n.doNotTrack==='0'?'Disabled':'Unset');
  h+=RR('Cookies',n.cookieEnabled);
  h+=RR('Online',n.onLine);
  h+=RR('Dark Mode',!!(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches));
  h+=RR('Touch Device',n.maxTouchPoints>0);
  h+=RR('PDF Viewer',!!n.pdfViewerEnabled);
  if(conn){
    h+='<div class="mini-div"></div>';
    h+=R('Network Type',conn.effectiveType||conn.type||null,true);
    h+=R('Downlink',conn.downlink!=null?conn.downlink+' Mbps':null,true);
    h+=R('RTT',conn.rtt!=null?conn.rtt+' ms':null,true);
    h+=RR('Save Data',conn.saveData??null);
  }
  h+='<div class="mini-div"></div>';
  h+='<div style="font-size:11px;color:var(--muted);padding:2px 0 2px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">User Agent</div>';
  h+=`<div class="ua-box">${esc(ua)}</div>`;
  if(n.getBattery){
    n.getBattery().then(b=>{
      const el=$('b-dev');if(!el)return;
      const s=Math.round(b.level*100)+'% — '+(b.charging?'Charging':'On battery');
      const d=document.createElement('div');d.innerHTML=R('Battery',s);
      const md=el.querySelector('.mini-div');
      if(md)el.insertBefore(d,md);else el.prepend(d);
    }).catch(()=>{});
  }
  return h;
}

function startClock(off){
  if(clk)clearInterval(clk);
  function tick(){
    const el=$('v-clock');if(!el){clearInterval(clk);return;}
    const n=new Date(),u=n.getTime()+n.getTimezoneOffset()*60000,t=new Date(u+off*1000);
    el.textContent=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
  }
  tick();clk=setInterval(tick,1000);
}

async function load(){
  if(busy)return;
  busy=true;D=null;RAW=null;
  if(cd){clearInterval(cd);cd=null;}
  if(clk){clearInterval(clk);clk=null;}

  const btn=$('btn-refresh');
  btn.disabled=true;btn.textContent='↻ Loading…';
  status('Fetching IP addresses…');

  $('v-country').innerHTML=sk(110,21);
  $('v-v4').innerHTML=sk(105,14);
  $('v-v6').innerHTML=sk(150,14);
  $('v-isp').innerHTML=sk(130,14);
  $('cp-v4').classList.add('hidden');
  $('cp-v6').classList.add('hidden');
  ['net','loc','time','flags','raw'].forEach(s=>
    $('b-'+s).innerHTML='<div class="sec-note">Tap to load</div>'
  );

  try{
    // IPs
    const [r4,r6]=await Promise.all([
      ft('https://api.ipify.org?format=json',5000).then(r=>r.ok?r.json():null).catch(()=>null),
      ft('https://api6.ipify.org?format=json',5000).then(r=>r.ok?r.json():null).catch(()=>null)
    ]);

    const v4=r4?.ip||null;
    const v6=(r6?.ip&&r6.ip.includes(':'))?r6.ip:null;

    $('v-v4').textContent=v4||'Unavailable';
    $('v-v6').textContent=v6||'Not available';
    if(v4){$('cp-v4').classList.remove('hidden');}
    if(v6){$('cp-v6').classList.remove('hidden');}

    if(!v4){
      $('v-country').textContent='Could not get IP';
      $('v-isp').textContent='—';
      status('IP fetch failed — check connection',true);
      busy=false;startCD();return;
    }

    // fire ipinfo.io + proxycheck.io (via CORS proxy waterfall) in parallel
    status('Fetching location data…');
    const pcUrl=`https://proxycheck.io/v2/${encodeURIComponent(v4)}?vpn=1&asn=1`;

    // each proxy wraps differently — {url, parse} where parse extracts JSON from response
    const CORS_PROXIES=[
      { url:`https://corsproxy.io/?url=${encodeURIComponent(pcUrl)}`,
        parse:r=>r.json() },
      { url:`https://api.allorigins.win/get?url=${encodeURIComponent(pcUrl)}`,
        parse:r=>r.json().then(w=>JSON.parse(w.contents)) },
      { url:`https://thingproxy.freeboard.io/fetch/${pcUrl}`,
        parse:r=>r.json() },
      { url:`https://proxy.cors.sh/${pcUrl}`,
        parse:r=>r.json() },
    ];

    async function fetchProxyCheck(){
      for(const p of CORS_PROXIES){
        try{
          const r=await ft(p.url,7000);
          if(!r.ok) continue;
          const d=await p.parse(r);
          if(d && d.status==='ok' && d[v4]) return d; // valid result
        }catch(_){ /* try next */ }
      }
      return null;
    }

    const [geo, pchk] = await Promise.all([
      ft(`https://ipinfo.io/${encodeURIComponent(v4)}/json`, 7000)
        .then(r=>r.ok?r.json():null).catch(()=>null),
      fetchProxyCheck()
    ]);

    RAW={ipinfo:geo, proxycheck:pchk};

    if(!geo||geo.error){
      $('v-country').textContent='Geo lookup failed';
      $('v-isp').textContent='—';
      status('ipinfo.io failed — try again later',true);
      busy=false;startCD();return;
    }

    // parse ipinfo fields
    const [lat,lon]=(geo.loc||'').split(',');
    const asnMatch=(geo.org||'').match(/^(AS\d+)\s+(.*)/);
    const asn=asnMatch?asnMatch[1]:null;
    const org=asnMatch?asnMatch[2]:(geo.org||null);
    const cc=(geo.country||'').toUpperCase();
    const meta=CC[cc]||{};
    const tz=geo.timezone||null;
    const off=tz?tzOffset(tz):null;

    // proxy: try proxycheck.io first, fall back to ASN/org heuristic
    let isProxy=null, proxyType=null, proxySrc='';
    if(pchk && pchk.status==='ok' && pchk[v4]){
      const pc=pchk[v4];
      isProxy=(pc.proxy==='yes');
      proxyType=pc.type||null;
      proxySrc='proxycheck.io';
    } else {
      // proxycheck unavailable — infer from org/ASN name
      // known VPN/proxy/datacenter keywords
      const vpnOrgs=/mullvad|nordvpn|expressvpn|surfshark|cyberghost|ipvanish|purevpn|hidemyass|hotspot.shield|tunnelbear|windscribe|protonvpn|pia\b|private.internet|torguard|vypr|zenmate|ivacy|hide\.me|perfect.privacy|airvpn|cryptostorm|ovpn\.com|anonine|ra4w|vpnsecure|whogohost.*vpn|steganos/i;
      const dcOrgs=/amazon|aws\b|google.cloud|microsoft.azure|digitalocean|linode|vultr|hetzner|ovh\b|leaseweb|choopa|quadranet|psychz|colocrossing|hostwinds|datacamp\b|m247\b|serverius|ipxo|contabo|frantech|buyvm|terrahost|fdcservers|tzulo|bhost|packetflip|zare\.net|infatica|limenet/i;
      if(vpnOrgs.test(org||'')){isProxy=true;proxyType='VPN';proxySrc='org-name';}
      else if(dcOrgs.test(org||'')){isProxy=false;proxySrc='org-name';}
      else{isProxy=false;proxySrc='org-name';}
    }

    D={
      v4, v6: v6||'Not available',
      // network
      rdns:      geo.hostname||null,
      asn:       asn || (pc?.asn ? 'AS'+pc.asn : null),
      org,
      isp:       org,
      // location — from ipinfo + static CC table
      country:   meta.n||cc||null,
      cc:        cc||null,
      continent: meta.cont||null,
      region:    geo.region||null,
      regionCode:null,
      city:      geo.city||null,
      district:  null,
      zip:       geo.postal||null,
      lat:       lat||null,
      lon:       lon||null,
      calling:   meta.call||null,
      capital:   meta.cap||null,
      is_eu:     meta.eu!=null?meta.eu:null,
      langs:     meta.lang||null,
      borders:   meta.b||null,
      // time
      tz,
      offset:    off,
      utcStr:    off!=null?utcS(off):null,
      // currency — from static CC table
      curr:      meta.curr||null,
      currCode:  meta.ccode||null,
      currSym:   meta.csym||null,
      // flags
      mobile:  /jio|airtel|bsnl|vodafone|vi mobile|idea cellular|tata tele|reliance mobile|celcom|maxis|digi |singtel|starhub|globe telecom|smart comm|sun cellular|true move|dtac|mobitel|grameenphone|robi|banglalink|ncell|safaricom|mtn|glo mobile|etisalat|du mobile|zain|ooredoo|viva|mobily|stc mobile|t-mobile|at&t mobility|verizon wireless|sprint|metro pcs|cricket wireless|boost mobile|o2 mobile|three uk|vodafone uk|telstra mobile|optus mobile|softbank mobile|docomo|au by kddi|sk telecom|kt corp|lg uplus|china mobile|china unicom/i.test(org||''),
      hosting: /amazon|aws|google cloud|microsoft azure|digitalocean|linode|vultr|hetzner|ovh|cloudflare|fastly|akamai|leaseweb|choopa|quadranet|psychz|colocrossing|hostwinds|datacamp|m247|serverius|ipxo|contabo/i.test(org||''),
      proxy:      isProxy,
      proxyType,
      proxySrc
    };

    $('v-country').textContent=D.country||cc||'—';
    $('v-isp').textContent=D.isp||'—';
    status('Done · ipinfo.io + proxycheck.io');
    fillOpen();

  }catch(e){
    status('Error: '+e.message,true);
    $('v-country').textContent='Error';
    $('v-isp').textContent='—';
  }

  busy=false;startCD();
}

function startCD(){
  const btn=$('btn-refresh');let n=10;
  btn.disabled=true;btn.textContent='↻ Wait '+n+'s';
  cd=setInterval(()=>{
    if(--n<=0){clearInterval(cd);cd=null;btn.disabled=false;btn.textContent='↻ Refresh';}
    else btn.textContent='↻ Wait '+n+'s';
  },1000);
}

window.doCopy=function(id,el){
  const t=($( id)?.textContent||'').trim();
  if(!t||t==='—')return;
  const done=()=>{const o=el.textContent;el.textContent='copied!';setTimeout(()=>el.textContent=o,900);};
  navigator.clipboard?navigator.clipboard.writeText(t).then(done).catch(()=>fb(t,done)):fb(t,done);
};
function fb(t,done){
  const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(a);a.focus();a.select();try{document.execCommand('copy');done();}catch(_){}a.remove();
}

$('btn-refresh').addEventListener('click',load);
load();
})();
</script>
